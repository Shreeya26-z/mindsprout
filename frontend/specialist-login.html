<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindSprout — Specialist Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">

      <div class="logo">🩺</div>
      <h1>Specialist Login</h1>
      <p class="subtitle">Welcome back, doctor</p>

      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password"/>
      </div>

      <button class="btn-primary" onclick="specialistLogin()">Log In</button>

      <p class="switch-auth">
        Don't have an account? <a href="specialist-signup.html">Sign up</a>
      </p>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
