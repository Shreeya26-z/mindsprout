<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindSprout — Specialist Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="dashboard-container">

    <!-- Header -->
    <div class="dashboard-header">
      <div class="header-left">
        <span class="logo-small">🩺</span>
        <span class="app-name">Specialist Panel</span>
      </div>
      <button class="btn-logout" onclick="specialistLogout()">Logout</button>
    </div>

    <!-- Welcome -->
    <div class="welcome-section">
      <h1>Hello, <span id="specialistName">there</span> 👋</h1>
      <p id="specialistSpecialty">Loading your specialty...</p>
    </div>

    <!-- Availability Toggle -->
    <div class="chart-card">
      <div class="chart-title">Your Availability</div>
      <div class="availability-row">
        <span id="availabilityStatus">Checking...</span>
        <button class="btn-add" id="toggleAvailabilityBtn" onclick="toggleAvailability()">Toggle</button>
      </div>
    </div>

    <!-- Conversations -->
    <div class="section-title">Your Conversations</div>
    <div id="conversationsList" class="history-list">
      <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Loading...</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
