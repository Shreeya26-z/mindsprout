<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindSprout — Self-Care Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="dashboard-container">

    <!-- Header -->
    <div class="dashboard-header">
      <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back</button>
      <span class="app-name">Self-Care Journal</span>
      <div></div>
    </div>

    <!-- Title -->
    <div class="welcome-section">
      <h1>Daily Reflection 📓</h1>
      <p>Take a moment to check in with yourself</p>
    </div>

    <!-- Today's Prompt -->
    <div class="chart-card">
      <div class="chart-title">✨ Today's Prompt</div>
      <p id="todayPrompt" style="color: white; font-size: 15px; line-height: 1.6;">
        Loading your prompt...
      </p>
    </div>

    <!-- Journal Entry -->
    <div class="form-group" style="margin-top: 16px;">
      <label>Your thoughts...</label>
      <textarea
        id="journalEntry"
        placeholder="Write freely — this is your safe space. There are no right or wrong answers..."
        rows="8"
        style="min-height: 180px;"
      ></textarea>
    </div>

    <!-- Word count -->
    <div style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 4px; text-align: right;">
      <span id="wordCount">0</span> words
    </div>

    <!-- Messages -->
    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <!-- Submit -->
    <button class="btn-primary" style="margin-top: 16px;" onclick="saveJournalEntry()">
      Save & Reflect 🌱
    </button>

    <!-- AI Analysis Result -->
    <div id="analysisCard" class="analysis-card" style="display: none;">
      <div class="analysis-title">💭 Reflection Insights</div>
      <div id="analysisText" class="analysis-text"></div>
      <div id="emotionDetected" class="emotion-tag"></div>
    </div>

    <!-- Past Entries -->
    <div class="section-title" style="margin-top: 24px;">Past Entries</div>
    <div id="journalHistory" class="history-list">
      <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Loading...</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
