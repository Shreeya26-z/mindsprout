<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindSprout — Find a Specialist</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="dashboard-container">

    <!-- Header -->
    <div class="dashboard-header">
      <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back</button>
      <span class="app-name">Find a Specialist</span>
      <div></div>
    </div>

    <!-- Title -->
    <div class="welcome-section">
      <h1>Connect with Experts 🩺</h1>
      <p>Find licensed professionals who specialize in mental health</p>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterSpecialists('all', this)">All</button>
      <button class="filter-tab" onclick="filterSpecialists('available', this)">Available Now</button>
      <button class="filter-tab" onclick="filterSpecialists('rated', this)">Top Rated</button>
    </div>

    <!-- Messages -->
    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <!-- Specialists List -->
    <div id="specialistsList" class="specialist-list">
      <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Loading specialists...</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
